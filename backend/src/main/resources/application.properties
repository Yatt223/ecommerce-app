# ===== APPLICATION =====
spring.application.name=ecommerce-backend
server.port=8080

# ===== BASE DE DONNèES =====
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Yattoura@223
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=ecommerce_secret_key_super_longue_au_moins_256_bits_pour_hs256
jwt.expiration=86400000

# ===== UPLOAD IMAGES =====
upload.dir=uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== CORS =====
cors.allowed-origins=http://localhost:4200

# ===== SQL INIT (obligatoire pour data.sql) =====
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true